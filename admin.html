<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="admin.js"></script>
</head>

<body>

<!-- ログイン画面 -->
<div id="login-screen" class="container">
    <h2>ログイン</h2>
    <form id="login-form">
        <input id="email" type="email" placeholder="メールアドレス" autocomplete="email" required>
        <input type="password" id="passwordInput" placeholder="パスワード" autocomplete="current-password" required>
        <button type="submit" class="back-btn">ログイン</button>
    </form>
</div>

<!-- 管理画面 -->
<div id="admin-content" style="display:none;">

    <header>
        <button id="langBtn" onclick="logout()">ログアウト</button>
        <a href="index.html">ブログに戻る</a>
        <h1>管理画面</h1>
    </header>

    <main>
        <div class="container">

            <section>
                <h2>下書き一覧</h2>
                <ul id="draft-list"></ul>
            </section>

            <section>
                <h2>投稿一覧</h2>
                <ul id="admin-post-list"></ul>
            </section>

            <section>
                <h2>予約投稿</h2>
                <ul id="scheduled-list"></ul>
            </section>

        </div>
    </main>

</div>

</body>
</html>
