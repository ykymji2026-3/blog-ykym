<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css?v=posts-visible-1">
    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/post-utils.js?v=latest-posts-1"></script>
    <script type="module" src="../assets/js/admin.js?v=admin-detail-1"></script>
</head>

<body class="admin-page">

    <!-- 管理画面 -->
    <div id="admin-content" hidden>

        <div data-component="../components/header.html"></div>
        <a class="header-btn-left" href="../public/" data-header-action="left" data-ja="ブログに戻る"
            data-en="Back to Blog">ブログに戻る</a>
        <button class="header-logout-btn" onclick="logout()" data-header-action="right" data-ja="ログアウト"
            data-en="Log out">ログアウト</button>

        <main>
            <div class="container">
                <section>
                    <h2 data-ja="管理画面" data-en="Admin">管理画面</h2>
                </section>

                <section>
                    <h2 data-ja="下書き一覧" data-en="Drafts">下書き一覧</h2>
                    <ul id="draft-list"></ul>
                </section>

                <section>
                    <h2 data-ja="予約投稿" data-en="Scheduled Posts">予約投稿</h2>
                    <ul id="scheduled-list"></ul>
                </section>

                <section>
                    <h2 data-ja="投稿一覧" data-en="Post List">投稿一覧</h2>
                    <div data-component="../components/search.html"></div>
                    <ul id="admin-post-list"></ul>
                </section>
            </div>
        </main>

    </div>

    <div data-component="../components/footer.html"></div>
    <div id="toast" class="toast"></div>

</body>

</html>
