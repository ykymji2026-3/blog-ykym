<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
<div data-component="../components/header.html"></div>

<main>
  <div class="container">
    <section>
      <h2 data-ja="ログイン" data-en="Login">ログイン</h2>

      <form id="login-form" class="card">
        <p>
          <input id="email"
            class="form-control"
            type="email"
            data-ja-placeholder="メールアドレス"
            data-en-placeholder="Email"
            placeholder="メールアドレス"
            autocomplete="email"
            required>
        </p>

        <p>
          <input id="password" class="form-control" type="password"
            data-ja-placeholder="パスワード"
            data-en-placeholder="Password"
            placeholder="パスワード"
            autocomplete="current-password"
            required>
        </p>

        <p class="form-actions">
          <button type="submit"
            id="login-submit"
            class="btn"
            data-ja="ログイン"
            data-en="Login">ログイン</button>
        </p>
      </form>
    </section>
  </div>
</main>

<div data-component="../components/footer.html"></div>
<div id="toast" class="toast"></div>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/components.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
  let currentLang = localStorage.getItem("lang") || "ja";
  const firebaseConfig = {
    apiKey: "AIzaSyDgFf_GZVsiJyQpfgDVH_P4ILRkHAz7F1U",
    authDomain: "blog-e4600.firebaseapp.com",
    projectId: "blog-e4600"
  };

  firebase.initializeApp(firebaseConfig);

  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      location.href = "../admin/";
    }
  });

  function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const button = document.getElementById("login-submit");

    button.disabled = true;

    firebase.auth().signInWithEmailAndPassword(email, password)
      .then(() => {
        location.href = "../admin/";
      })
      .catch(e => {
        showToast(getLoginErrorMessage(e.code));
        console.error(e);
      })
      .finally(() => {
        button.disabled = false;
      });
  }

  function getLoginErrorMessage(code) {
    const messages = {
      "auth/invalid-email": {
        ja: "メールアドレスの形式が正しくありません。",
        en: "The email address is invalid."
      },
      "auth/user-disabled": {
        ja: "このアカウントは無効になっています。",
        en: "This account has been disabled."
      },
      "auth/user-not-found": {
        ja: "このメールアドレスのユーザーは見つかりません。",
        en: "No user was found for this email address."
      },
      "auth/wrong-password": {
        ja: "パスワードが違います。",
        en: "The password is incorrect."
      },
      "auth/invalid-credential": {
        ja: "メールアドレスまたはパスワードが違います。",
        en: "The email address or password is incorrect."
      },
      "auth/missing-password": {
        ja: "パスワードを入力してください。",
        en: "Please enter your password."
      },
      "auth/too-many-requests": {
        ja: "ログイン試行が多すぎます。少し時間をおいて再度お試しください。",
        en: "Too many login attempts. Please try again later."
      },
      "auth/network-request-failed": {
        ja: "ネットワークに接続できません。通信状況を確認してください。",
        en: "Network error. Please check your connection."
      }
    };

    const fallback = {
      ja: "ログインできませんでした。入力内容を確認してください。",
      en: "Could not log in. Please check your details."
    };
    const message = messages[code] || fallback;

    return message[currentLang];
  }

  function toggleLang() {
    currentLang = currentLang === "ja" ? "en" : "ja";
    localStorage.setItem("lang", currentLang);
    applyLang();
  }

  function applyLang() {
    document.documentElement.lang = currentLang;

    document.querySelectorAll("[data-ja]").forEach(el => {
      el.textContent = el.getAttribute("data-" + currentLang);
    });

    document.querySelectorAll("[data-ja-placeholder]").forEach(el => {
      el.placeholder = el.getAttribute("data-" + currentLang + "-placeholder");
    });

    const langBtn = document.getElementById("langBtn");
    if (langBtn) {
      langBtn.textContent =
        currentLang === "ja" ? "Switch to English" : "日本語に切り替える";
    }
  }

  window.onload = () => {
    document.getElementById("login-form").addEventListener("submit", event => {
      event.preventDefault();
      login();
    });

    applyLang();
  };
</script>

</body>
</html>
