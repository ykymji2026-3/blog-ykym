<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  font-family: Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  background: #f5f7fb;
  text-align: center;
  padding: 50px;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  display: inline-block;
}

#langBtn {
  position: fixed;
  top: 20px;
  right: 20px;
}
</style>

</head>

<body>
<button id="langBtn" onclick="toggleLang()">Switch to English</button>

<div class="box">
  <h2 data-ja="ログイン" data-en="Login">ログイン</h2>

  <form id="login-form">
    <input id="email"
      type="email"
      data-ja-placeholder="メールアドレス"
      data-en-placeholder="Email"
      placeholder="メールアドレス"
      autocomplete="email"
      required>

    <br><br>

    <input id="password" type="password"
      data-ja-placeholder="パスワード"
      data-en-placeholder="Password"
      placeholder="パスワード"
      autocomplete="current-password"
      required>

    <br><br>

    <button type="submit"
      data-ja="ログイン"
      data-en="Login">ログイン</button>
  </form>

  <p id="msg"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
  let currentLang = localStorage.getItem("lang") || "ja";
  const firebaseConfig = {
    apiKey: "AIzaSyDgFf_GZVsiJyQpfgDVH_P4ILRkHAz7F1U",
    authDomain: "blog-e4600.firebaseapp.com",
    projectId: "blog-e4600"
  };

  firebase.initializeApp(firebaseConfig);

  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      location.href = "../admin.html";
    }
  });

  function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    firebase.auth().signInWithEmailAndPassword(email, password)
      .then(() => {
        location.href = "../admin.html";
      })
      .catch(e => {
        document.getElementById("msg").textContent =
          currentLang === "ja" ? "ログインに失敗しました" : "Login failed";
        console.error(e);
      });
  }

  function toggleLang() {
    currentLang = currentLang === "ja" ? "en" : "ja";
    localStorage.setItem("lang", currentLang);
    applyLang();
  }

  function applyLang() {
    document.documentElement.lang = currentLang;

    document.querySelectorAll("[data-ja]").forEach(el => {
      el.textContent = el.getAttribute("data-" + currentLang);
    });

    document.querySelectorAll("[data-ja-placeholder]").forEach(el => {
      el.placeholder = el.getAttribute("data-" + currentLang + "-placeholder");
    });

    document.getElementById("langBtn").textContent =
      currentLang === "ja" ? "Switch to English" : "日本語に切り替える";
  }

  window.onload = () => {
    document.getElementById("login-form").addEventListener("submit", event => {
      event.preventDefault();
      login();
    });

    applyLang();
  };
</script>

</body>
</html>
