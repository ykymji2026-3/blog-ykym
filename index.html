        header {
            background: #7b1e3a;
            color: white;
            text-align: center;
            padding: 60px 20px;
            position: relative;
        }

        header h1 {
            margin: 0;

        }

        header p {
            margin-top: 10px;
            font-size: 16px;
            opacity: 0.85;
        }

        #langBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            min-width: 160px;

        #langBtn:hover {

        }

        main {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
        }

        section {
            margin-bottom: 40px;
            min-height: 120px;
        }

        h2 {
            border-bottom: 2px solid #ddd;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 6px;
        }

        .card {
            background: #f9fafb;
            padding: 16px;
            border-radius: 8px;
        }

        a {
            color: #2563eb;
            text-decoration: none;
        }

        a:hover {
            opacity: 0.7;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>

    <script>
        let currentLang = "ja";

        function toggleLang() {
            currentLang = currentLang === "ja" ? "en" : "ja";

            document.querySelectorAll("[data-ja]").forEach(el => {
                el.textContent = el.getAttribute("data-" + currentLang);
            });

            const btn = document.getElementById("langBtn");
            btn.textContent = currentLang === "ja" ? "Switch to English" : "日本語に切り替える";
        }
    </script>

</body>
