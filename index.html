<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            background: #f5f7fb;
            color: #333333;
            font-family: Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
        }

        header {
            background: #7b1e3a;
            color: white;
            text-align: center;
            padding: 60px 20px;
            position: relative;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
        }

        header p {
            margin-top: 10px;
            font-size: 16px;
            opacity: 0.85;
        }

        #langBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            min-width: 160px;
            height: 35px;
            text-align: center;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: white;
            color: #1f2937;
            font-size: 14px;
        }

        #langBtn:hover {
            opacity: 0.7;
        }

        main {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
        }

        section {
            margin-bottom: 40px;
            min-height: 120px;
        }

        h2 {
            border-bottom: 2px solid #ddd;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin-bottom: 6px;
        }

        .card {
            background: #f9fafb;
            padding: 16px;
            border-radius: 8px;
        }

        a {
            color: #2563eb;
            text-decoration: none;
        }

        a:hover {
            opacity: 0.7;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <button id="langBtn" onclick="toggleLang()">Switch to English</button>
        <h1 data-ja="IT女子の学習と日常" data-en="An IT girl's study and daily life">
            IT女子の学習と日常
        </h1>

        <p data-ja="ITやAWSの学習を初心者目線で分かりやすくまとめています" data-en="Sharing IT & AWS learning from a beginner’s perspective">
            ITやAWSの学習を初心者目線で分かりやすくまとめています
        </p>
    </header>

    <main>
        <section>
            <h2 data-ja="リンク集" data-en="Link Collection">リンク集</h2>
            <p>
                <a href="http://localhost:5500/blog-ykym/" target="_blank" rel="noopener noreferrer"
                    data-ja="ポートフォリオサイトはこちら" data-en="Portfolio Site link">ポートフォリオサイトはこちら</a>
                <br>
                <a href="https://github.com/ykymji2026-3" target="_blank" rel="noopener noreferrer" data-ja="GitHubはこちら"
                    data-en="GitHub Link">GitHubはこちら</a>
            </p>
        </section>

        <section>
            <h2 data-ja="投稿一覧" data-en="Post List">投稿一覧</h2>
            <ul id="post-list">
            <li class="card">
                <a href="1776684318922.html">yoyaku</a>
                <div class="meta">2026/04/20 20:25 / 日記</div>
            </li>
            </ul>
        </section>

    </main>

    <footer>
        <p data-ja="? 2026 Portfolio" data-en="? 2026 Portfolio">@ 2026 ykym-blog</p>
    </footer>

    <script>
        let currentLang = "ja";

        function toggleLang() {
            currentLang = currentLang === "ja" ? "en" : "ja";

            document.querySelectorAll("[data-ja]").forEach(el => {
                el.textContent = el.getAttribute("data-" + currentLang);
            });

            const btn = document.getElementById("langBtn");
            btn.textContent = currentLang === "ja" ? "Switch to English" : "日本語に切り替える";
        }
    </script>

</body>

</html>
